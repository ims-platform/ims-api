name: Backend CI

on:
  pull_request:
    branches: [develop, staging, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install || echo "No dependencies yet"

      - name: Build project
        run: npm run build || echo "No build configured yet"

      - name: Run tests
        run: npm run test || echo "No tests configured yet"
