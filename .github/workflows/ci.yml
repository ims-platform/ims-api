name: Backend CI

on:
  pull_request:
    branches: [develop, staging, main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint || echo "Lint no configurado"

      - name: Build
        run: pnpm run build || echo "Build no configurado"

      - name: Test
        run: pnpm run test || echo "Tests no configurados"
